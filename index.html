<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMCU — Bass House Producer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #020202;
  --white: #ede9e4;
  --red: #c0170f;
  --red2: #e01a10;
  --chrome: #b8b0c8;
  --chrome2: #c9a84c;
  --green: #3fff2a;
  --purple: #9b6fff;
  --muted: #282828;
  --muted2: #666;
  --card: #0a0a0a;
  --border: #1a1a1a;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

html { scroll-behavior: smooth; }
body {
  background: var(--black);
  color: var(--white);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  overflow-x: hidden;
}

.cursor { display:none; }

body::after {
  content:'';
  position: fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; z-index:9990;
}

/* NAV */
nav {
  position: fixed; top:0; left:0; right:0; z-index:200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 48px;
  transition: background .3s, border-color .3s;
  border-bottom: 1px solid transparent;
}
nav.scrolled { background: rgba(2,2,2,.95); border-color: var(--border); backdrop-filter: blur(16px); }
.nav-logo img { height: 42px; filter: drop-shadow(0 0 12px rgba(180,140,255,.3)); }
.nav-links { display:flex; gap:32px; list-style:none; }
.nav-links a {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted2); text-decoration: none; transition: color .2s;
}
.nav-links a:hover { color: var(--white); }
.nav-cta {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  background: var(--red2); color: var(--white); border: none; padding: 10px 22px; cursor: none; transition: background .2s;
}
.nav-cta:hover { background: #ff2010; }

/* HERO */
.hero {
  min-height: 100vh;
  display: grid; grid-template-columns: 1fr 1fr;
  position: relative; overflow: hidden;
}
.hero::before {
  content:''; position:absolute; inset:0; z-index:1; pointer-events:none;
  background: radial-gradient(ellipse 60% 80% at 0% 50%, rgba(192,23,15,.15) 0%, transparent 65%),
              radial-gradient(ellipse 40% 40% at 100% 80%, rgba(155,111,255,.07) 0%, transparent 60%);
}
.hero-left {
  display:flex; flex-direction:column; justify-content:flex-end;
  padding: 120px 48px 160px; position:relative; z-index:2;
}
.hero-tag {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted2); margin-bottom: 28px;
  opacity:0; animation: fadeUp .7s .3s forwards;
}
.hero-tag span { color: var(--red2); }
.hero-logo {
  width: min(460px, 90%); margin-bottom: 36px;
  opacity:0; animation: fadeUp .8s .5s forwards;
  filter: drop-shadow(0 0 28px rgba(192,23,15,.22)) drop-shadow(0 0 56px rgba(155,111,255,.13));
}
.hero-desc {
  font-size: 15px; color: var(--muted2); max-width: 400px; line-height: 1.8;
  font-weight: 300; margin-bottom: 40px;
  opacity:0; animation: fadeUp .7s .7s forwards;
}
.hero-actions {
  display:flex; gap:16px; flex-wrap:wrap;
  opacity:0; animation: fadeUp .7s .9s forwards;
}
.btn-main {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  background: var(--red2); color: var(--white); border: none; padding: 14px 28px; cursor: none; transition: background .2s;
}
.btn-main:hover { background: #ff2010; }
.btn-outline {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  background: transparent; color: var(--white); border: 1px solid var(--border); padding: 14px 28px; cursor: none;
  transition: border-color .2s, color .2s;
}
.btn-outline:hover { border-color: var(--chrome); color: var(--chrome); }
.hero-right { position:relative; overflow:hidden; }
.hero-photo {
  width:100%; height:100%; object-fit:cover; object-position:center top;
  filter: contrast(1.05);
  opacity:0; animation: fadeIn 1.2s .4s forwards;
}
.hero-right::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(to right, var(--black) 0%, transparent 30%),
              linear-gradient(to top, var(--black) 0%, transparent 15%),
              rgba(192,23,15,.06);
}
.stats-bar {
  position:absolute; bottom:0; left:0; right:0; z-index:3;
  border-top: 1px solid var(--border);
  display:grid; grid-template-columns: repeat(3,1fr);
  background: rgba(2,2,2,.85); backdrop-filter:blur(12px);
}
.stat { padding: 24px 32px; border-right: 1px solid var(--border); opacity:0; animation: fadeUp .6s forwards; }
.stat:nth-child(1){animation-delay:.8s}
.stat:nth-child(2){animation-delay:.95s}
.stat:nth-child(3){animation-delay:1.1s;border-right:none}
.stat-n { font-family:var(--font-display); font-size:40px; color:var(--white); display:block; line-height:1; }
.stat-l { font-family:var(--font-mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted2); margin-top:4px; display:block; }

/* MARQUEE */
.marquee-wrap { border-top:1px solid var(--border); border-bottom:1px solid var(--border); overflow:hidden; padding:14px 0; background:#060606; }
.marquee-track { display:flex; animation:marquee 22s linear infinite; white-space:nowrap; }
.m-item { font-family:var(--font-display); font-size:16px; letter-spacing:5px; color:var(--muted); padding:0 32px; }
.m-item.r { color:var(--red2); }
.m-item.c { color:var(--chrome); }

/* SECTIONS */
section { padding: 120px 48px; }
.s-label { font-family:var(--font-mono); font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--red2); margin-bottom:16px; }
.s-title { font-family:var(--font-display); font-size:clamp(44px,6vw,76px); line-height:.95; letter-spacing:1px; margin-bottom:60px; }

/* ABOUT */
.about-grid { display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center; }
.about-photos { display:grid; grid-template-columns:1fr 1fr; gap:4px; }
.about-photo { width:100%; aspect-ratio:3/4; object-fit:cover; object-position:center top; transition:filter .4s; }
.about-photo:hover { filter:contrast(1.1) brightness(1.05); }
.about-text p { font-size:15px; color:var(--muted2); line-height:1.9; font-weight:300; margin-bottom:20px; }
.about-text p strong { color:var(--white); font-weight:400; }
.genre-pills { display:flex; flex-wrap:wrap; gap:8px; margin-top:32px; }
.pill {
  font-family:var(--font-mono); font-size:10px; letter-spacing:2px; text-transform:uppercase;
  border:1px solid var(--border); color:var(--muted2); padding:6px 14px; transition:border-color .2s, color .2s;
}
.pill.active { border-color:var(--red2); color:var(--red2); }
.pill:hover { border-color:var(--white); color:var(--white); }

.waveform { display:flex; align-items:center; gap:3px; height:36px; margin:28px 0; }
.wb { width:2px; background:var(--red2); border-radius:2px; opacity:.5; animation:wave var(--d,1s) ease-in-out infinite; animation-delay:var(--del,0s); }
@keyframes wave { 0%,100%{height:4px} 50%{height:var(--h,28px)} }

/* STORE */
.store-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; background:var(--border); }
.product-card { background:var(--card); padding:36px; position:relative; overflow:hidden; cursor:none; transition:background .3s; }
.product-card:hover { background:#0e0e0e; }
.product-card::after { content:''; position:absolute; top:0;left:0;right:0;height:1px; background:linear-gradient(90deg,var(--red2),var(--purple)); transform:scaleX(0); transform-origin:left; transition:transform .3s; }
.product-card:hover::after { transform:scaleX(1); }
.p-type { font-family:var(--font-mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted2); margin-bottom:14px; }
.p-name { font-family:var(--font-display); font-size:26px; letter-spacing:1px; margin-bottom:12px; line-height:1.1; }
.p-desc { font-size:13px; color:var(--muted2); line-height:1.7; margin-bottom:28px; font-weight:300; }
.p-footer { display:flex; align-items:center; justify-content:space-between; }
.p-price { font-family:var(--font-display); font-size:30px; }
.p-price span { font-family:var(--font-mono); font-size:11px; color:var(--muted2); }
.btn-buy { font-family:var(--font-mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; background:transparent; border:1px solid var(--border); color:var(--white); padding:10px 16px; cursor:none; transition:background .2s, border-color .2s; }
.btn-buy:hover { background:var(--red2); border-color:var(--red2); }
.p-badge { position:absolute; top:20px;right:20px; font-family:var(--font-mono); font-size:9px; letter-spacing:1px; text-transform:uppercase; background:var(--red2); color:var(--white); padding:4px 8px; }

/* GHOST */
.ghost-section { background:var(--card); border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
.ghost-grid { display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:start; }
.ghost-list { list-style:none; margin-bottom:40px; }
.ghost-list li { padding:18px 0; border-bottom:1px solid var(--border); display:flex; gap:16px; align-items:flex-start; font-size:14px; color:var(--muted2); font-weight:300; line-height:1.6; }
.ghost-list li::before { content:''; width:5px;height:5px; background:var(--red2); border-radius:50%; flex-shrink:0; margin-top:8px; }
.ghost-list li strong { color:var(--white); font-weight:400; }
.ghost-form { background:#050505; border:1px solid var(--border); padding:40px; }
.form-title { font-family:var(--font-display); font-size:22px; letter-spacing:2px; margin-bottom:28px; }
.form-group { margin-bottom:18px; }
.form-label { font-family:var(--font-mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted2); display:block; margin-bottom:6px; }
.form-input,.form-select,.form-textarea { width:100%; background:var(--black); border:1px solid var(--border); color:var(--white); font-family:var(--font-body); font-size:14px; padding:12px 14px; outline:none; transition:border-color .2s; font-weight:300; }
.form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--red2); }
.form-textarea { resize:vertical; min-height:90px; }
.form-select { appearance:none; cursor:none; }
.form-input::placeholder,.form-textarea::placeholder { color:var(--muted); }

/* MEMBERSHIP */
.member-grid { display:grid; grid-template-columns:1fr 1fr; gap:2px; background:var(--border); }
.member-card { background:var(--card); padding:48px; position:relative; overflow:hidden; }
.member-card.featured { background:#0c0000; }
.member-card.featured::before { content:'RECOMENDADO'; position:absolute; top:22px;right:-34px; background:var(--red2); color:var(--white); font-family:var(--font-mono); font-size:9px; letter-spacing:2px; padding:5px 48px; transform:rotate(45deg); }
.m-plan { font-family:var(--font-mono); font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted2); margin-bottom:20px; }
.m-price { font-family:var(--font-display); font-size:64px; line-height:1; margin-bottom:4px; }
.m-price small { font-family:var(--font-mono); font-size:12px; color:var(--muted2); }
.m-curr { font-family:var(--font-mono); font-size:11px; color:var(--muted2); margin-bottom:32px; }
.m-perks { list-style:none; margin-bottom:40px; }
.m-perks li { font-size:13px; color:var(--muted2); padding:10px 0; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; font-weight:300; }
.chk { width:16px;height:16px;background:var(--red2);color:var(--white);font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700; }
.chk.off { background:var(--muted); }
.m-perks li strong { color:var(--white); font-weight:400; }

/* CHAT */
.chat-box { background:var(--card); border:1px solid var(--border); padding:40px; margin-top:60px; }
.chat-hdr { display:flex;align-items:center;gap:12px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border); }
.chat-dot { width:8px;height:8px;background:var(--red2);border-radius:50%;animation:pulse 2s infinite; }
.chat-ttl { font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2); }
.chat-msgs { display:flex;flex-direction:column;gap:14px;margin-bottom:20px; }
.msg { max-width:75%;padding:14px 18px;font-size:13px;line-height:1.6;font-weight:300; }
.msg.u { align-self:flex-end;background:#161616;border:1px solid var(--border); }
.msg.a { align-self:flex-start;background:#0d0000;border:1px solid rgba(192,23,15,.3); }
.msg.a .ml { font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:var(--red2);text-transform:uppercase;margin-bottom:6px; }
.chat-row { display:flex;gap:8px; }
.chat-inp { flex:1;background:#080808;border:1px solid var(--border);color:var(--muted2);font-family:var(--font-mono);font-size:12px;padding:12px 16px;outline:none;font-style:italic; }
.chat-btn { background:var(--red2);border:none;color:var(--white);font-family:var(--font-mono);font-size:11px;letter-spacing:1px;padding:12px 20px;cursor:none;text-transform:uppercase;font-weight:500; }

/* FOOTER */
footer { border-top:1px solid var(--border); padding:60px 48px; display:flex;align-items:center;justify-content:space-between; }
.footer-logo img { height:36px; filter:drop-shadow(0 0 10px rgba(192,23,15,.3)); }
.footer-links { display:flex;gap:32px;list-style:none; }
.footer-links a { font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);text-decoration:none;transition:color .2s; }
.footer-links a:hover { color:var(--white); }
.footer-copy { font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px; }

.reveal { opacity:0;transform:translateY(36px);transition:opacity .7s,transform .7s; }
.reveal.in { opacity:1;transform:none; }

@keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:none} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

/* REPRODUCTOR BEATPORT STYLE */
.track-player {
  background: #050505;
  border: 1px solid var(--border);
  padding: 14px;
  margin-bottom: 20px;
  position: relative;
  user-select: none;
}
.player-top { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.play-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--red2); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .2s;
}
.play-btn:hover { background: #ff2010; }
.play-btn svg { pointer-events: none; }
.player-info { flex: 1; min-width: 0; }
.player-title { font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-sub { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; color: var(--muted2); margin-top: 2px; }
.player-time { font-family: var(--font-mono); font-size: 10px; color: var(--muted2); flex-shrink: 0; }
.waveform-container {
  position: relative; height: 40px; cursor: pointer;
  background: #080808; overflow: hidden;
}
.waveform-canvas { width: 100%; height: 100%; display: block; }
.progress-overlay {
  position: absolute; top: 0; left: 0; height: 100%;
  background: rgba(224,26,16,.15); pointer-events: none;
  transition: width .1s linear;
}
.preview-badge {
  position: absolute; top: 8px; right: 8px;
  font-family: var(--font-mono); font-size: 8px; letter-spacing: 1px;
  background: rgba(0,0,0,.7); color: var(--muted2); padding: 3px 6px;
  text-transform: uppercase;
}
</style>

  <script>
  // ============ SUPABASE ============
  const SUPABASE_URL = 'https://anvkreqmsbzsfaepudlx.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFudmtyZXFtc2J6c2ZhZXB1ZGx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODIyODYsImV4cCI6MjA5MDQ1ODI4Nn0.mX58ZTWLgEXyYRk92RlwzaaFdmTxVn6PGygsnXDsHeY';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  window._sb = sb;
  let currentUser = null, currentProfile = null;

  sb.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      currentUser = session.user;
      const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
      currentProfile = data;
    } else {
      currentUser = null; currentProfile = null;
    }
    window._currentUser = currentUser;
    window._currentProfile = currentProfile;
    updateNavBtn();
    if (currentProfile?.role === 'admin') showAdminPanel();
  });

  function updateNavBtn() {
    const btn = document.getElementById('auth-btn');
    if (!btn) return;
    if (currentUser) {
      btn.textContent = currentProfile?.nombre || currentUser.email.split('@')[0];
      btn.style.background = currentProfile?.role === 'admin' ? '#6b0000' : 'var(--red2)';
      closeAuthModal();
    } else {
      btn.textContent = 'Iniciar sesión';
      btn.style.background = 'var(--red2)';
    }
  }

  function showAdminPanel() {
    if (document.getElementById('admin-panel')) return;
    const p = document.createElement('div');
    p.id = 'admin-panel';
    p.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9000;background:#080000;border:1px solid var(--red2);padding:20px;font-family:var(--font-mono);';
    p.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><p style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--red2);">// Admin</p><a href="/amcu_admin.html" style="font-size:10px;color:var(--white);text-decoration:none;border:1px solid var(--border);padding:4px 10px;">Panel →</a></div><button onclick="doLogout()" style="width:100%;background:none;border:1px solid var(--border);color:var(--muted2);font-family:var(--font-mono);font-size:10px;padding:8px;cursor:pointer;">Cerrar sesión</button>`;
    document.body.appendChild(p);
  }

  async function loadBlockedSlots() {
    const { data: blocked } = await sb.from('blocked_slots').select('*');
    if (blocked) blocked.forEach(s => { if(s.hora===null) blockedDays.add(s.fecha); else bookedSlots.add(`${s.fecha}-${String(s.hora).padStart(2,'0')}`); });
    const { data: bookings } = await sb.from('bookings').select('fecha,hora').in('estado',['pendiente','confirmada']);
    if (bookings) bookings.forEach(b => { bookedSlots.add(`${b.fecha}-${String(b.hora).padStart(2,'0')}`); bookedSlots.add(`${b.fecha}-${String(b.hora+1).padStart(2,'0')}`); });
    renderCal();
  }

  async function confirmarReserva() {
    const nombre = document.getElementById('r-nombre').value.trim();
    const email  = document.getElementById('r-email').value.trim();
    const msg    = document.getElementById('r-msg')?.value || '';
    if (!nombre || !email) { alert('Completá nombre y email'); return; }
    const [dy,dm,dd,hh] = selectedSlot.split('-');
    const btn = document.querySelector('#form-reserva .btn-main');
    if (btn) { btn.textContent='Guardando...'; btn.disabled=true; }
    const { error } = await sb.from('bookings').insert({ fecha:`${dy}-${dm}-${dd}`, hora:parseInt(hh), modalidad, nombre, email, mensaje:msg, user_id:currentUser?.id||null });
    if (error) { alert('Error: '+error.message); if(btn){btn.textContent='Confirmar reserva';btn.disabled=false;} return; }
    bookedSlots.add(selectedSlot);
    bookedSlots.add(`${dy}-${dm}-${dd}-${String(parseInt(hh)+1).padStart(2,'0')}`);
    document.getElementById('form-reserva').style.display='none';
    document.getElementById('reserva-ok').style.display='block';
    selectedSlot=null; renderCal();
  }

  async function loadStore() {
    const STATIC_IDS=['ac444f3a-502f-47cf-8633-1da9b97f6a2f','8b9c5ce0-3497-4f2a-9b39-4d9d2a01f3b4'];
    const grid=document.getElementById('store-grid');
    const prox=grid?.lastElementChild;
    try {
      const res=await fetch(`${SUPABASE_URL}/rest/v1/products?activo=eq.true&order=created_at.desc`,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
      const data=await res.json();
      if(!Array.isArray(data)) return;
      data.forEach(p=>{
        if(p.archivo_url){const z=document.getElementById('player-zone-'+p.id);if(z&&z.innerHTML===''){z.innerHTML=renderPlayer(p.id,p.nombre,p.preview_start||0);z.insertAdjacentHTML('afterend',`<span id="asrc-${p.id}" style="display:none;position:absolute;" data-e="${btoa(unescape(encodeURIComponent(p.archivo_url)))}"></span>`);}}
      });
      if(grid&&prox){
        const tl={sample_pack:'Sample Pack',track_unreleased:'Track Unreleased',bundle:'Bundle'};
        const bc={sample_pack:'var(--red2)',track_unreleased:'var(--purple)',bundle:'var(--chrome2)'};
        const bt={sample_pack:'DISPONIBLE',track_unreleased:'UNRELEASED',bundle:'BUNDLE'};
        data.filter(p=>!STATIC_IDS.includes(p.id)).forEach(p=>{
          if(document.getElementById('pc-'+p.id)) return;
          const c=document.createElement('div');c.className='product-card';c.id='pc-'+p.id;
          c.innerHTML=`<div class="p-badge" style="background:${bc[p.tipo]||'var(--red2)'}">${bt[p.tipo]||'NUEVO'}</div><div class="p-type">${tl[p.tipo]||p.tipo}</div><div class="p-name">${p.nombre}</div><p class="p-desc">${p.descripcion||''}</p>${p.archivo_url?`<div id="player-zone-${p.id}">${renderPlayer(p.id,p.nombre,p.preview_start||0)}</div><span id="asrc-${p.id}" style="display:none;position:absolute;" data-e="${btoa(unescape(encodeURIComponent(p.archivo_url)))}"></span>`:''}<div class="p-footer"><div class="p-price">$${p.precio} <span>USD</span></div><button class="btn-buy" onclick="openMPModal('${p.nombre.replace(/'/g,"\'")}',${p.precio},'${p.id}')">Comprar</button></div>`;
          grid.insertBefore(c,prox);
        });
      }
    } catch(e){console.log('Store:',e);}
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const { data:{session} } = await sb.auth.getSession();
    if(session?.user){
      currentUser=session.user;
      const {data}=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
      currentProfile=data;
      window._currentUser=currentUser;
      window._currentProfile=currentProfile;
      updateNavBtn();
      if(currentProfile?.role==='admin') showAdminPanel();
    }
    loadBlockedSlots();
    loadStore();
  });
  </script>

  <!-- AUTH + MP + CHAT — scope global -->
  <script>
  // ---- TABS ----
  var currentTab='login';
  function switchTab(tab){
    currentTab=tab;
    var isReg=tab==='register';
    var tl=document.getElementById('tab-login');
    var tr=document.getElementById('tab-register');
    var fn=document.getElementById('field-nombre');
    var sb2=document.getElementById('auth-submit');
    if(tl){tl.style.borderBottomColor=isReg?'transparent':'var(--red2)';tl.style.color=isReg?'#555':'var(--white)';}
    if(tr){tr.style.borderBottomColor=isReg?'var(--red2)':'transparent';tr.style.color=isReg?'var(--white)':'#555';}
    if(fn) fn.style.display=isReg?'block':'none';
    if(sb2) sb2.textContent=isReg?'Crear cuenta':'Entrar';
    var msg=document.getElementById('auth-msg');if(msg)msg.textContent='';
  }

  // ---- MODAL ----
  function openAuthModal(){
    if(window._currentUser){showAccountMenu();return;}
    var m=document.getElementById('auth-modal');
    if(m) m.style.display='flex';
    setTimeout(function(){var e=document.getElementById('auth-email');if(e)e.focus();},100);
  }
  function closeAuthModal(){var m=document.getElementById('auth-modal');if(m)m.style.display='none';}

  // ---- GOOGLE ----
  async function loginWithGoogle(){
    var btn=document.getElementById('google-btn');
    if(btn) btn.textContent='Conectando...';
    try{
      var r=await window._sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin,queryParams:{prompt:'select_account'}}});
      if(r.error) throw r.error;
    }catch(e){
      var msg=document.getElementById('auth-msg');
      if(msg) msg.textContent='Error: '+e.message;
      if(btn) btn.textContent='Continuar con Google';
    }
  }

  // ---- LOGIN EMAIL ----
  async function doLogin(){
    var email=document.getElementById('auth-email')?.value?.trim();
    var pass=document.getElementById('auth-pass')?.value;
    var msg=document.getElementById('auth-msg');
    var btn=document.getElementById('auth-submit');
    if(!email||!pass){if(msg)msg.textContent='Completá email y contraseña';return;}
    if(msg){msg.style.color='var(--red2)';msg.textContent='';}
    if(btn){btn.textContent='Cargando...';btn.disabled=true;}
    try{
      if(currentTab==='register'){
        var nombre=document.getElementById('auth-nombre')?.value?.trim()||'';
        var r=await window._sb.auth.signUp({email,password:pass,options:{data:{nombre}}});
        if(r.error) throw r.error;
        if(msg){msg.style.color='#3fff2a';msg.textContent='¡Cuenta creada! Revisá tu email.';}
        if(btn){btn.textContent='Crear cuenta';btn.disabled=false;}
        return;
      }else{
        var r=await window._sb.auth.signInWithPassword({email,password:pass});
        if(r.error) throw r.error;
        closeAuthModal();
      }
    }catch(e){
      if(msg){msg.style.color='var(--red2)';msg.textContent=e.message==='Invalid login credentials'?'Email o contraseña incorrectos':e.message;}
    }
    if(btn){btn.textContent=currentTab==='register'?'Crear cuenta':'Entrar';btn.disabled=false;}
  }

  // ---- LOGOUT ----
  async function doLogout(){
    await window._sb.auth.signOut();
    window._currentUser=null;window._currentProfile=null;
    var p=document.getElementById('admin-panel');if(p)p.remove();
    var m=document.getElementById('account-menu');if(m)m.remove();
    var btn=document.getElementById('auth-btn');
    if(btn){btn.textContent='Iniciar sesión';btn.style.background='var(--red2)';}
  }

  function showAccountMenu(){
    var ex=document.getElementById('account-menu');if(ex){ex.remove();return;}
    var btn=document.getElementById('auth-btn');if(!btn)return;
    var rect=btn.getBoundingClientRect();
    var menu=document.createElement('div');
    menu.id='account-menu';
    menu.style.cssText='position:fixed;top:'+(rect.bottom+6)+'px;right:'+(window.innerWidth-rect.right)+'px;z-index:10000;background:#0a0a0a;border:1px solid #222;min-width:200px;';
    menu.innerHTML='<div style="padding:14px 16px;border-bottom:1px solid #151515;"><p style="font-family:var(--font-mono);font-size:10px;color:#555;">'+(window._currentUser?.email||'')+'</p>'+(window._currentProfile?.role==='admin'?'<p style="font-family:var(--font-mono);font-size:9px;color:var(--red2);margin-top:4px;">ADMIN</p>':'')+'</div><button onclick="doLogout()" style="width:100%;background:none;border:none;color:var(--white);font-family:var(--font-mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:12px 16px;cursor:pointer;text-align:left;">Cerrar sesión</button>';
    document.body.appendChild(menu);
    setTimeout(function(){document.addEventListener('click',function rm(e){if(!menu.contains(e.target)){menu.remove();document.removeEventListener('click',rm);}});},100);
  }

  // ---- MERCADO PAGO ----
  function openMPModal(name,price,id){
    window.mpCurrentProduct={name:name,price:price,id:id};
    var pn=document.getElementById('mp-product-name');
    var pp=document.getElementById('mp-product-price');
    var pe=document.getElementById('mp-email');
    var pn2=document.getElementById('mp-nombre');
    if(pn) pn.textContent=name;
    if(pp) pp.textContent='$'+price+' USD';
    if(pe&&window._currentUser) pe.value=window._currentUser.email||'';
    if(pn2&&window._currentProfile) pn2.value=window._currentProfile.nombre||'';
    var m=document.getElementById('mp-modal');
    if(m) m.style.display='flex';
  }
  function closeMPModal(){var m=document.getElementById('mp-modal');if(m)m.style.display='none';}

  async function initMercadoPago(){
    var email=document.getElementById('mp-email')?.value?.trim();
    var nombre=document.getElementById('mp-nombre')?.value?.trim();
    var btn=document.getElementById('mp-btn');
    if(!email||!nombre){alert('Completá email y nombre');return;}
    if(!window.mpCurrentProduct)return;
    if(btn){btn.textContent='Procesando...';btn.disabled=true;}
    try{
      var sb=window._sb;
      var ins={nombre,email,monto:window.mpCurrentProduct.price,estado:'pendiente',user_id:window._currentUser?.id||null};
      var pid=window.mpCurrentProduct.id;
      if(pid&&pid!=='null') ins.product_id=pid;
      var {data:order,error:oErr}=await sb.from('orders').insert(ins).select().single();
      if(oErr) throw oErr;
      var mpRes=await fetch('https://api.mercadopago.com/checkout/preferences',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer APP_USR-6279290744423286-033017-8e3d0a0cf635fba6d3a2603e51e249e9-3302590997'},
        body:JSON.stringify({
          items:[{title:window.mpCurrentProduct.name,quantity:1,unit_price:parseFloat(window.mpCurrentProduct.price),currency_id:'USD'}],
          payer:{email:email,name:nombre},
          external_reference:order.id,
          back_urls:{success:window.location.origin+'?pago=ok&order='+order.id,failure:window.location.origin+'?pago=error',pending:window.location.origin+'?pago=pendiente'},
          auto_return:'approved'
        })
      });
      var mpData=await mpRes.json();
      if(!mpData.init_point) throw new Error(mpData.message||'Sin init_point: '+JSON.stringify(mpData));
      closeMPModal();
      window.location.href=mpData.init_point;
    }catch(e){
      console.error('MP:',e);
      alert('Error: '+e.message);
      if(btn){btn.textContent='Pagar con Mercado Pago';btn.disabled=false;}
    }
  }

  // Resultado pago
  (function(){
    var p=new URLSearchParams(window.location.search).get('pago');
    if(!p)return;
    history.replaceState(null,'',window.location.pathname);
    if(p==='ok'){setTimeout(function(){var d=document.createElement('div');d.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;';d.innerHTML='<div style="background:#050505;border:1px solid #3fff2a;padding:48px;text-align:center;max-width:360px;"><div style="font-family:var(--font-display);font-size:56px;color:#3fff2a;margin-bottom:12px;">✓</div><p style="font-family:var(--font-display);font-size:26px;letter-spacing:2px;margin-bottom:10px;">PAGO EXITOSO</p><p style="font-family:var(--font-mono);font-size:11px;color:#666;margin-bottom:24px;">Revisá tu email — te enviamos el link de descarga.</p><button onclick="this.closest('div[style]').remove()" style="background:#3fff2a;border:none;color:#000;font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:12px 24px;cursor:pointer;">Cerrar</button></div>';document.body.appendChild(d);},500);}
  })();

  // ---- CHAT GROQ ----
  const AMCU_SYSTEM=`Sos AMCU, DJ y productor de Bass House argentino con 8 años de carrera y sellos top. Setup: Ableton 12, Serum, Waves, FabFilter. BPM: 128-132. Ref: Chris Lake. Respondés en español rioplatense, directo, máx 150 palabras.`;
  let chatHistory=[];

  async function sendChat(){
    var input=document.getElementById('chat-input');
    var msg=input?.value?.trim();
    if(!msg)return;
    input.value='';
    var btn=document.getElementById('chat-send');
    if(btn) btn.disabled=true;
    addChatMsg(msg,'u');
    chatHistory.push({role:'user',content:msg});
    var tid=addTypingMsg();
    try{
      var res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer 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'},body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:300,messages:[{role:'system',content:AMCU_SYSTEM},...chatHistory]})});
      var data=await res.json();
      removeTypingMsg(tid);
      var reply=data.choices?.[0]?.message?.content||'Intentá de nuevo.';
      addChatMsg(reply,'a');
      chatHistory.push({role:'assistant',content:reply});
    }catch(e){removeTypingMsg(tid);addChatMsg('Error de conexión.','a');}
    if(btn) btn.disabled=false;
    if(input) input.focus();
  }

  function addChatMsg(text,type){
    var msgs=document.getElementById('chat-msgs');if(!msgs)return;
    var div=document.createElement('div');div.className='msg '+(type==='u'?'u':'a');
    if(type==='a') div.innerHTML='<div class="ml">AMCU</div>'+text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/
/g,'<br>');
    else div.textContent=text;
    msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
  }
  function addTypingMsg(){var msgs=document.getElementById('chat-msgs');if(!msgs)return;var id='t'+Date.now();var d=document.createElement('div');d.className='msg a typing';d.id=id;d.innerHTML='<div class="ml">AMCU</div><span class="dot"></span><span class="dot"></span><span class="dot"></span>';msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;return id;}
  function removeTypingMsg(id){var el=document.getElementById(id);if(el)el.remove();}
  function askSuggestion(btn){var input=document.getElementById('chat-input');if(input)input.value=btn.textContent;var s=document.getElementById('chat-suggestions');if(s)s.style.display='none';sendChat();}
  </script>
